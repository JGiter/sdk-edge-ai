# nRF Edge AI
CONFIG_NRF_EDGEAI=y
# nRF Edge AI dependencies
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_NANO=y
CONFIG_FPU=y

CONFIG_DATA_COLLECTION_MODE=n

################################################################################
# Enable sensor, button and LED libraries

CONFIG_SENSOR=y
CONFIG_LSM6DSL=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y
CONFIG_I2C=y

CONFIG_GPIO=y

CONFIG_PWM=y
CONFIG_LED=y
CONFIG_LED_PWM=y
CONFIG_LED_NOTIFICATION_BLINK=y

CONFIG_BUTTONS=n
################################################################################
# Enable logging and assert

CONFIG_EARLY_CONSOLE=y
# CONFIG_SHELL=y
CONFIG_LOG=y
# CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
# CONFIG_SERIAL=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_LINE_CTRL=y

CONFIG_ASSERT=y
CONFIG_ASSERT_VERBOSE=y

################################################################################
# Bluetooth configuration

CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
# CONFIG_BT_GATT_AUTO_UPDATE_MTU=y
# CONFIG_BLE_MODE_NUS=y
CONFIG_BLE_MODE_GATT_CUSTOM=y
CONFIG_BT_NUS_LOG_LEVEL_INF=y
# CONFIG_BLE_MODE_NONE=y
CONFIG_BT_MAX_CONN=2
# CONFIG_BT_SMP=y
CONFIG_BT_L2CAP_TX_BUF_COUNT=5
# HCI ACL buffers size
# BT_L2CAP_RX_MTU = CONFIG_BT_BUF_ACL_RX_SIZE - BT_L2CAP_HDR_SIZE
CONFIG_BT_BUF_ACL_RX_SIZE=251
# L2CAP SDU/PDU TX MTU
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF Edge AI Remote Control"
CONFIG_BT_DEVICE_APPEARANCE=961

CONFIG_BT_GATT_UUID16_POOL_SIZE=40
CONFIG_BT_GATT_CHRC_POOL_SIZE=20

CONFIG_BT_GATT_POOL=y
CONFIG_BT_CONN_CTX=y

CONFIG_BT_DIS_MANUF_NAME=y
CONFIG_BT_DIS_MANUF_NAME_STR="NordicSemiconductor"
CONFIG_BT_DIS_PNP_VID_SRC=2
CONFIG_BT_DIS_PNP_VID=0x1915
CONFIG_BT_DIS_PNP_PID=0xEEEF
CONFIG_BT_DIS_PNP_VER=0x0100

CONFIG_BT_SETTINGS=y

CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

################################################################################
# Enable MCUmgr, MCUmgr handlers, and dependencies
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y

CONFIG_STREAM_FLASH=y
# CONFIG_IMG_MANAGER=y

# CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=y

# Enable the Bluetooth MCUmgr transport (unauthenticated)
CONFIG_MCUMGR_TRANSPORT_BT=y
# CONFIG_MCUMGR_TRANSPORT_BT_CONN_PARAM_CONTROL=y
CONFIG_MCUMGR_TRANSPORT_BT_REASSEMBLY=y
CONFIG_MCUMGR_TRANSPORT_BT_PERM_RW=y
